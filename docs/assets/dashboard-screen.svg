<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Cloud Cost Guardrail — dashboard</title>
  <desc id="desc">Illustrative preview of the application dashboard: header, summary cards, cost chart, and recommendations.</desc>
  <!-- Content column: x=64, width=1072 (centered in 1200) -->
  <rect width="1200" height="820" fill="#f7f8fb"/>
  <!-- Header -->
  <rect x="64" y="40" width="1072" height="168" rx="28" fill="#ffffff" fill-opacity="0.9" stroke="#e2e8f0"/>
  <circle cx="118" cy="88" r="5" fill="#10b981"/>
  <rect x="132" y="76" width="88" height="26" rx="13" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="144" y="94" fill="#047857" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="12" font-weight="700">Live data</text>
  <rect x="232" y="76" width="102" height="26" rx="13" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="244" y="94" fill="#334155" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="12" font-weight="600">6-month view</text>
  <text x="96" y="148" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="32" font-weight="600">Cloud cost guardrail dashboard</text>
  <text x="96" y="182" fill="#475569" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="14">Analyze AWS spend, surface idle resources, and send owner-aware alerts.</text>
  <rect x="900" y="72" width="108" height="40" rx="14" fill="#2563eb"/>
  <text x="924" y="97" fill="#ffffff" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="13" font-weight="600">Refresh data</text>
  <rect x="1016" y="72" width="92" height="40" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1036" y="97" fill="#334155" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="13" font-weight="600">Sign out</text>

  <!-- Summary row: 4 equal cards, gap 24, total width 1072 -->
  <!-- w = (1072 - 3*24) / 4 = 250 -->
  <g>
    <rect x="64" y="232" width="250" height="112" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="88" y="268" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="13">Month-to-date</text>
    <text x="88" y="312" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="30" font-weight="700">$12.34</text>
    <rect x="338" y="232" width="250" height="112" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="362" y="268" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="13">Selected window</text>
    <text x="362" y="312" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="30" font-weight="700">$42.11</text>
    <rect x="612" y="232" width="250" height="112" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="636" y="268" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="13">Open recommendations</text>
    <text x="636" y="312" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="30" font-weight="700">2</text>
    <rect x="886" y="232" width="250" height="112" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="910" y="268" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="13">Notifications</text>
    <text x="910" y="312" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="24" font-weight="700">Gmail</text>
  </g>

  <!-- Two-column section: left wider (~56%), gap 24 -->
  <!-- left: 600px at x=64, right: 448px at x=688 ? 64+600+24+448=1136, 1136-64=1072 ? -->
  <rect x="64" y="376" width="600" height="360" rx="26" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="88" y="416" fill="#2563eb" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.15em">ANALYZE</text>
  <text x="88" y="448" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="22" font-weight="600">Cost analyzer</text>
  <!-- Chart inset -->
  <rect x="88" y="472" width="552" height="240" rx="16" fill="#f8fafc" stroke="#f1f5f9"/>
  <polyline
    fill="none"
    stroke="#2563eb"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    points="112,668 180,620 248,640 316,560 384,580 452,520 520,540 588,500"
  />

  <rect x="688" y="376" width="448" height="360" rx="26" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="712" y="416" fill="#2563eb" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.15em">RECOMMENDATIONS</text>
  <text x="712" y="448" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="22" font-weight="600">Recommended guardrails</text>
  <rect x="712" y="468" width="400" height="38" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="728" y="492" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="12">Search, filters, status…</text>
  <rect x="712" y="522" width="400" height="58" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="728" y="548" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="15" font-weight="600">Unattached EBS volume: vol-001</text>
  <text x="728" y="568" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="12">Warning · New · dev · $8/mo</text>
  <rect x="712" y="594" width="400" height="58" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="728" y="620" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="15" font-weight="600">Idle EC2 instance: i-001</text>
  <text x="728" y="640" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="12">Critical · Acknowledged · prod · $42/mo</text>
</svg>
