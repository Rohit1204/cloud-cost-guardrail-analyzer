<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Cloud Cost Guardrail  sign-in screen</title>
  <desc id="desc">Illustrative preview of the application login page with gradient background, feature tiles, and Google sign-in.</desc>
  <defs>
    <radialGradient id="blob1" cx="25%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f1f5f9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="85%" cy="75%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f1f5f9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f1f5f9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="780" fill="#f8fafc"/>
  <rect width="1200" height="780" fill="url(#blob1)"/>
  <rect width="1200" height="780" fill="url(#blob2)"/>
  <rect width="1200" height="780" fill="url(#blob3)"/>

  <!-- Center card (matches max-w-lg style) -->
  <rect x="344" y="56" width="512" height="668" rx="28" fill="#ffffff" fill-opacity="0.92" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Shield icon -->
  <rect x="376" y="88" width="52" height="52" rx="16" fill="url(#shieldBg)"/>
  <path d="M402 102l14 6v12c0 14-10 24-14 26-4-2-14-12-14-26v-12l14-6z" fill="#2563eb"/>

  <text x="376" y="172" fill="#2563eb" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.2em">CLOUD COST GUARDRAIL</text>
  <text x="376" y="210" fill="#020617" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="28" font-weight="600">Welcome back</text>
  <text x="376" y="248" fill="#475569" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="14">Sign in with Google to open your dashboardcost</text>
  <text x="376" y="268" fill="#475569" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="14">insights, recommendations, and alert controls.</text>

  <!-- Feature tiles -->
  <rect x="376" y="296" width="144" height="108" rx="16" fill="#f8fafc" stroke="#f1f5f9"/>
  <rect x="404" y="312" width="28" height="28" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="418" y="330" fill="#2563eb" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">¤</text>
  <text x="448" y="332" fill="#0f172a" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Costs &amp; trends</text>
  <text x="448" y="352" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="10" text-anchor="middle">MTD, charts, drivers</text>

  <rect x="528" y="296" width="144" height="108" rx="16" fill="#f8fafc" stroke="#f1f5f9"/>
  <rect x="556" y="312" width="28" height="28" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="570" y="330" fill="#2563eb" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">Ć</text>
  <text x="600" y="332" fill="#0f172a" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Protected access</text>
  <text x="600" y="352" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="10" text-anchor="middle">Verified sign-in</text>

  <rect x="680" y="296" width="144" height="108" rx="16" fill="#f8fafc" stroke="#f1f5f9"/>
  <rect x="708" y="312" width="28" height="28" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="722" y="330" fill="#2563eb" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">É</text>
  <text x="752" y="332" fill="#0f172a" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Alerts &amp; workflow</text>
  <text x="752" y="352" fill="#64748b" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="10" text-anchor="middle">Run alerts &amp; status</text>

  <!-- Google button -->
  <rect x="376" y="432" width="448" height="48" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
  <circle cx="408" cy="456" r="12" fill="#4285f4"/>
  <text x="434" y="462" fill="#334155" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="15" font-weight="600">Sign in with Google</text>

  <text x="600" y="518" fill="#94a3b8" font-family="system-ui, Segoe UI, Inter, sans-serif" font-size="11" text-anchor="middle">By continuing, Google shares your name and email for access control.</text>
</svg>
